name: ig-autopost
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency: ig-autopost
jobs:
  post:
    runs-on: ubuntu-latest
    env:
      TZ: America/Chicago
      DUE_CAP: '5'
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      BASE_URL: ${{ secrets.BASE_URL }}
      SCHEDULE_CSV: POSTING_SCHEDULE.csv
      STATE_FILE: posted.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python ig_autopost.py --due
      - name: persist state
        run: |
          if ! git diff --quiet posted.json 2>/dev/null; then
            git config user.name "autopost-bot"
            git config user.email "bot@users.noreply.github.com"
            git add posted.json && git commit -m "state [skip ci]" && git push
          fi
